<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLOCK BLAST ULTIMATE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Заставка */
        #splash {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(45deg, #f06, #4a90e2, #50e3c2, #f5a623);
            background-size: 400% 400%; animation: rainbow 8s infinite;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        #splash h1 { font-size: 60px; font-weight: 900; letter-spacing: -2px; margin: 0; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }

        /* Контейнер приложения */
        #app { 
            width: 100%; max-width: 450px; height: 100vh; 
            background: radial-gradient(circle at top, #1a1a2e, #050505);
            display: none; flex-direction: column; position: relative;
        }

        /* Статистика */
        .stats-bar { 
            display: flex; justify-content: space-between; padding: 20px; 
            background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.5; }
        .stat-value { font-size: 20px; font-weight: 800; }

        /* Игровое поле */
        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        #grid { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
            width: 340px; height: 340px; background: rgba(255,255,255,0.03);
            padding: 8px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .cell { background: rgba(255,255,255,0.05); border-radius: 4px; transition: 0.2s; }
        .cell.occupied { background: var(--accent); box-shadow: 0 0 15px var(--accent), inset 0 0 10px rgba(255,255,255,0.5); border: 1px solid #fff; }
        .cell.preview { background: rgba(255,255,255,0.2); }

        /* Фигуры в руке */
        #hand { display: flex; justify-content: space-around; width: 100%; height: 120px; padding: 10px; }
        .shape-container { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; cursor: grab; }
        .shape-container:active { cursor: grabbing; }

        /* Кнопки */
        .btn { 
            background: var(--accent); color: #000; border: none; padding: 16px; 
            border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer;
            margin: 10px 20px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Чат */
        #chat { height: 160px; background: rgba(0,0,0,0.4); margin: 10px 20px; border-radius: 15px; display: flex; flex-direction: column; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        #messages { flex-grow: 1; overflow-y: auto; font-size: 13px; margin-bottom: 8px; }
        #chat input { background: rgba(255,255,255,0.1); border: none; padding: 10px; border-radius: 8px; color: #fff; outline: none; }

        /* Перетаскиваемый объект */
        #drag-proxy { position: fixed; pointer-events: none; z-index: 2000; display: none; opacity: 0.8; transform: scale(1.1); }
        
        /* Уровни */
        .lvl-green { color: #00ff88; }
        .lvl-red { color: #ff3333; }
        .lvl-purple { color: #bf5af2; }
        .lvl-black { color: #ffffff; text-shadow: 0 0 10px #fff, 0 0 20px var(--accent); }
    </style>
</head>
<body>

<div id="splash"><h1>Привет!</h1><p>Загрузка системы...</p></div>

<div id="app">
    <div class="stats-bar">
        <div class="stat"><span class="stat-label">ELO</span><span id="elo-val" class="stat-value">0</span></div>
        <div class="stat"><span class="stat-label">Level</span><span id="lvl-val" class="stat-value">1</span></div>
        <div class="stat"><span class="stat-label">Score</span><span id="score-val" class="stat-value">0</span></div>
    </div>

    <div id="game-area">
        <div id="target-info" style="color:var(--accent); font-weight:bold; margin-bottom:10px;">TARGET: 1000</div>
        <div id="grid"></div>
        <div id="hand"></div>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <input type="text" id="chat-input" placeholder="Введите сообщение...">
    </div>

    <button class="btn" onclick="location.reload()" style="background:#ff3b30; color:#fff">СДАТЬСЯ</button>
</div>

<div id="drag-proxy"></div>

<script>
    const socket = typeof io !== 'undefined' ? io() : null;
    const GRID_SIZE = 8;
    let board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
    let score = 0;
    let elo = parseInt(localStorage.getItem('leym_elo')) || 0;
    let nick = localStorage.getItem('leym_nick') || prompt("Твой ник:") || "User";
    localStorage.setItem('leym_nick', nick);

    // Инициализация интерфейса
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initGame();
        }, 500);
    }, 3000);

    function updateStats() {
        document.getElementById('elo-val').innerText = elo;
        document.getElementById('score-val').innerText = score;
        let lvl = Math.floor(elo / 50) + 1;
        let lvlSpan = document.getElementById('lvl-val');
        lvlSpan.innerText = lvl;
        lvlSpan.className = 'stat-value ' + (lvl > 500 ? 'lvl-black' : lvl > 150 ? 'lvl-purple' : lvl > 50 ? 'lvl-red' : 'lvl-green');
        document.getElementById('target-info').innerText = `TARGET: ${500 + lvl * 100}`;
    }

    // Чат
    const input = document.getElementById('chat-input');
    input.onkeypress = (e) => {
        if(e.key === 'Enter' && input.value.trim() && socket) {
            socket.emit('chat_msg', { nick, text: input.value });
            input.value = '';
        }
    }
    if(socket) socket.on('chat_msg', d => {
        const msgs = document.getElementById('messages');
        msgs.innerHTML += `<div><b>${d.nick}:</b> ${d.text}</div>`;
        msgs.scrollTop = msgs.scrollHeight;
        if(msgs.children.length > 5) msgs.removeChild(msgs.firstChild);
    });

    // Механика игры
    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i < GRID_SIZE * GRID_SIZE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }
        updateStats();
        spawnShapes();
    }

    const SHAPES = [
        { data: [[1,1],[1,1]], w:2, h:2 },
        { data: [[1,1,1,1]], w:4, h:1 },
        { data: [[1],[1],[1],[1]], w:1, h:4 },
        { data: [[1,1,1],[0,1,0]], w:3, h:2 },
        { data: [[1,1],[1,0]], w:2, h:2 }
    ];

    function spawnShapes() {
        const hand = document.getElementById('hand');
        hand.innerHTML = '';
        for(let i=0; i<3; i++) {
            const shape = SHAPES[Math.floor(Math.random()*SHAPES.length)];
            const container = document.createElement('div');
            container.className = 'shape-container';
            container.innerHTML = renderShapeHTML(shape.data);
            
            // Drag and Drop события
            container.onmousedown = (e) => handleStart(e, shape, container);
            container.ontouchstart = (e) => handleStart(e.touches[0], shape, container);
            
            hand.appendChild(container);
        }
    }

    function renderShapeHTML(data) {
        let html = '<div style="display:grid; grid-template-columns:repeat('+data[0].length+', 20px); gap:2px;">';
        data.forEach(row => row.forEach(cell => {
            html += `<div style="width:20px; height:20px; border-radius:2px; background:${cell ? 'var(--accent)' : 'transparent'}"></div>`;
        }));
        return html + '</div>';
    }

    function handleStart(e, shape, original) {
        const proxy = document.getElementById('drag-proxy');
        proxy.innerHTML = renderShapeHTML(shape.data);
        proxy.style.display = 'block';
        
        const move = (me) => {
            const clientX = me.clientX || me.touches[0].clientX;
            const clientY = me.clientY || me.touches[0].clientY;
            proxy.style.left = (clientX - 50) + 'px';
            proxy.style.top = (clientY - 50) + 'px';
        };

        const end = (ee) => {
            const clientX = ee.clientX || ee.changedTouches[0].clientX;
            const clientY = ee.clientY || ee.changedTouches[0].clientY;
            proxy.style.display = 'none';
            
            const grid = document.getElementById('grid');
            const rect = grid.getBoundingClientRect();
            const col = Math.floor((clientX - rect.left) / (rect.width/8));
            const row = Math.floor((clientY - rect.top) / (rect.height/8));

            if(canPlace(shape.data, row, col)) {
                place(shape.data, row, col);
                original.style.visibility = 'hidden';
                if(Array.from(document.querySelectorAll('.shape-container')).every(s => s.style.visibility === 'hidden')) spawnShapes();
            }

            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', end);
            window.removeEventListener('touchmove', move);
            window.removeEventListener('touchend', end);
        };

        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', end);
        move(e);
    }

    function canPlace(data, r, c) {
        for(let y=0; y<data.length; y++) {
            for(let x=0; x<data[y].length; x++) {
                if(data[y][x]) {
                    if(r+y < 0 || r+y >= 8 || c+x < 0 || c+x >= 8 || board[r+y][c+x]) return false;
                }
            }
        }
        return true;
    }

    function place(data, r, c) {
        for(let y=0; y<data.length; y++) {
            for(let x=0; x<data[y].length; x++) {
                if(data[y][x]) board[r+y][c+x] = 1;
            }
        }
        score += 10;
        checkLines();
        drawBoard();
    }

    function checkLines() {
        let rows = [], cols = [];
        for(let i=0; i<8; i++) {
            if(board[i].every(v => v === 1)) rows.push(i);
            if(board.map(r => r[i]).every(v => v === 1)) cols.push(i);
        }
        rows.forEach(r => board[r].fill(0));
        cols.forEach(c => board.forEach(r => r[c] = 0));
        if(rows.length || cols.length) score += (rows.length + cols.length) * 100;
        
        let target = 500 + (Math.floor(elo/50)+1) * 100;
        if(score >= target) {
            elo += 50;
            localStorage.setItem('leym_elo', elo);
            alert("ЦЕЛЬ ДОСТИГНУТА! +50 ELO");
            location.reload();
        }
        updateStats();
    }

    function drawBoard() {
        const cells = document.querySelectorAll('.cell');
        board.flat().forEach((val, i) => {
            cells[i].className = val ? 'cell occupied' : 'cell';
        });
    }
</script>
</body>
</html>
