<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Block Blast Online</title>
    <style>
        :root {
            --bg-rainbow: linear-gradient(45deg, #ff9a9e, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb);
        }
        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-rainbow);
            background-size: 400% 400%;
            animation: rainbow 15s ease infinite;
        }
        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: inherit; z-index: 100;
        }
        #splash h1 {
            font-size: 5rem; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            opacity: 0; transform: scale(0.5); animation: appear 1.5s forwards;
        }
        @keyframes appear { to { opacity: 1; transform: scale(1); } }

        /* Меню */
        #menu { display: none; text-align: center; padding: 20px; }
        .elo-info { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        
        /* Цвета уровней */
        .lvl-green { color: #2ecc71; }
        .lvl-red { color: #e74c3c; }
        .lvl-purple { color: #9b59b6; }
        .lvl-black { color: #2c3e50; }

        .btn-play {
            padding: 15px 50px; font-size: 24px; cursor: pointer;
            background: #fff; border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .btn-play:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        /* Чат */
        #chat-box {
            width: 300px; height: 150px; margin: 20px auto;
            background: rgba(255,255,255,0.7); border-radius: 10px;
            overflow-y: auto; padding: 10px; text-align: left; font-size: 14px;
        }

        /* Игровое поле */
        #game-container { display: none; position: relative; }
        #grid { 
            display: grid; grid-template-columns: repeat(8, 40px); 
            grid-template-rows: repeat(8, 40px); gap: 2px; 
            background: #bdc3c7; border: 5px solid #7f8c8d; margin: 20px auto;
        }
        .cell { width: 40px; height: 40px; background: #ecf0f1; }
        .cell.filled { background: #3498db; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="splash"><h1>Привет!</h1></div>

    <div id="nickname-screen" style="display:none; text-align:center; margin-top:20vh;">
        <h2>Введите ваш никнейм</h2>
        <input type="text" id="nick-input" maxlength="15">
        <button onclick="saveNickname()">Войти</button>
    </div>

    <div id="menu">
        <div class="elo-info">
            ELO: <span id="elo-display">0</span> | 
            LVL: <span id="lvl-display" class="lvl-green">1</span>
        </div>
        <button class="btn-play" onclick="showModes()">ИГРАТЬ</button>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Сообщение..." onkeypress="sendMsg(event)">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let elo = localStorage.getItem('elo') ? parseInt(localStorage.getItem('elo')) : 0;
        let nickname = localStorage.getItem('nickname');

        // 1. Splash Screen Logic
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            if (!nickname) {
                document.getElementById('nickname-screen').style.display = 'block';
            } else {
                showMenu();
            }
        }, 4500);

        function saveNickname() {
            const val = document.getElementById('nick-input').value;
            if(val) {
                localStorage.setItem('nickname', val);
                nickname = val;
                document.getElementById('nickname-screen').style.display = 'none';
                showMenu();
            }
        }

        function showMenu() {
            document.getElementById('menu').style.display = 'block';
            updateStats();
            loadLocalChat();
        }

        function updateStats() {
            const eloDisp = document.getElementById('elo-display');
            const lvlDisp = document.getElementById('lvl-display');
            eloDisp.innerText = elo;
            
            let lvl = Math.floor(elo / 10) + 1; // Простая логика уровня
            lvlDisp.innerText = lvl;

            lvlDisp.className = '';
            if (lvl <= 50) lvlDisp.classList.add('lvl-green');
            else if (lvl <= 150) lvlDisp.classList.add('lvl-red');
            else if (lvl <= 500) lvlDisp.classList.add('lvl-purple');
            else lvlDisp.classList.add('lvl-black');
        }

        // ЧАТ (Локальный на 5 сообщений)
        function loadLocalChat() {
            const messages = JSON.parse(localStorage.getItem('chat_history') || "[]");
            const box = document.getElementById('chat-box');
            box.innerHTML = messages.map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
        }

        function sendMsg(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('chat-input');
                let messages = JSON.parse(localStorage.getItem('chat_history') || "[]");
                messages.push({user: nickname, text: input.value});
                if(messages.length > 5) messages.shift();
                localStorage.setItem('chat_history', JSON.stringify(messages));
                input.value = '';
                loadLocalChat();
            }
        }
        
        // Логика игры (Block Blast) будет инициализироваться здесь...
    </script>
</body>
</html>
